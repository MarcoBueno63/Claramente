<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="skinGradient" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#ffd6c8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5c4b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8b09a;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="skinNeck" cx="50%" cy="20%">
      <stop offset="0%" style="stop-color:#f5c4b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9a78a;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="hairGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5d4037;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#4e342e;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#3e2723;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c1810;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8d6e63;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#a1887f;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8d6e63;stop-opacity:0.3" />
    </linearGradient>
    <radialGradient id="eyeWhite">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="irisGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#a67c52;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#8b6f47;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#6d5638;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a3728;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="lipsGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d98b8e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c97276;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b85f63;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="faceShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
